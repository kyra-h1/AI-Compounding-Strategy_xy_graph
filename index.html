  }

  }
  .page-header .subtitle {

  }

  .legend-bar {

  }
  .legend-item {

    align-items: center;
    gap: 6px;
    font-size: 12.5px;
    color: #475569;
    font-weight: 500;
  }
  .legend-dot {

    height: 12px;
    border-radius: 50%;

  }

    width: 100%;

    margin: 0 auto;
    padding: 0 20px 40px;
  }
  .chart-area {
    position: relative;
    width: 100%;
    aspect-ratio: 1.45 / 1;
    border-left: 2px solid #CBD5E1;
    border-bottom: 2px solid #CBD5E1;
    background: linear-gradient(135deg, #F8FAFC 0%, #F1F5F9 100%);
    border-radius: 0 8px 0 0;
    overflow: visible;
  }

  /* Quadrant backgrounds */
  .quadrant {

    display: flex;
    align-items: center;
    justify-content: center;
  }
  .q-tl { top: 0; left: 0; width: 50%; height: 50%; background: rgba(99,102,241,0.04); border-radius: 0 8px 0 0; }
  .q-tr { top: 0; left: 50%; width: 50%; height: 50%; background: rgba(139,92,246,0.04); }
  .q-bl { top: 50%; left: 0; width: 50%; height: 50%; background: rgba(59,130,246,0.04); }
  .q-br { top: 50%; left: 50%; width: 50%; height: 50%; background: rgba(16,185,129,0.04); }

  .quadrant-label {
    font-size: 15px;
    font-weight: 700;
    opacity: 0.18;
    pointer-events: none;
    user-select: none;
  }
  .q-tl .quadrant-label { color: #6366F1; }
  .q-tr .quadrant-label { color: #8B5CF6; }
  .q-bl .quadrant-label { color: #3B82F6; }
  .q-br .quadrant-label { color: #059669; }

  .center-h, .center-v {
    position: absolute;
    background: #94A3B8;
    opacity: 0.25;
  }
  .center-h { top: 50%; left: 0; width: 100%; height: 1px; }
  .center-v { top: 0; left: 50%; width: 1px; height: 100%; }

  /* Axis labels */
  .axis-label {
    position: absolute;
    font-size: 14px;
    font-weight: 700;
    color: #64748B;
    pointer-events: none;
  }
  .axis-x-left { bottom: -32px; left: 4%; }
  .axis-x-right { bottom: -32px; right: 2%; }
  .axis-y-bottom { top: calc(100% - 30px); left: -40px; transform: rotate(-90deg); transform-origin: center; }
  .axis-y-top { top: 10px; left: -48px; transform: rotate(-90deg); transform-origin: center; }

  /* Industry dots */
  .dot-group {
    position: absolute;
    transform: translate(-50%, -50%);
    z-index: 10;
    cursor: pointer;
  }
  .dot-outer {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    opacity: 0.18;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: all 0.3s ease;
  }
  .dot-inner {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 3px solid white;
    position: relative;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    transition: all 0.3s ease;
    z-index: 2;
  }
  .dot-group:hover .dot-outer {
    width: 50px;
    height: 50px;
    opacity: 0.28;
  }
  .dot-group:hover .dot-inner {
    width: 22px;
    height: 22px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }
  .dot-group.active .dot-outer {
    width: 54px;
    height: 54px;
    opacity: 0.3;
    animation: pulse 1.5s infinite;
  }
  .dot-group.active .dot-inner {
    width: 24px;
    height: 24px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.15; transform: translate(-50%, -50%) scale(1.3); }
  }

  /* Dot name tag */
  .dot-name {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    background: white;
    border: 1.5px solid;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    pointer-events: none;
    z-index: 3;
    transition: all 0.2s ease;
  }
  .dot-group:hover .dot-name {
    transform: translateX(-50%) scale(1.05);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  /* Detail Card (overlay) */
  .overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15,23,42,0.35);
    backdrop-filter: blur(4px);
    z-index: 100;
    justify-content: center;
    align-items: center;
    padding: 20px;

  .detail-card {

    box-shadow: 0 25px 60px rgba(0,0,0,0.2);
    overflow: hidden;
    animation: cardIn 0.3s ease;
    max-height: 90vh;
    overflow-y: auto;

    from { opacity: 0; transform: scale(0.92) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }

  .card-header {
    padding: 24px 28px 18px;
    position: relative;

  .card-header .card-cat {

    font-weight: 600;
    padding: 3px 10px;

    color: white;
    display: inline-block;
    margin-bottom: 8px;

    font-weight: 800;
    color: #0F172A;
    letter-spacing: -0.3px;
  }
  .card-header .card-close {

    top: 18px;
    right: 20px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: #F1F5F9;
    color: #64748B;
    font-size: 18px;

    align-items: center;

  .score-badge {

    font-size: 12.5px;
    color: #475569;

    padding: 10px 16px;
    background: #F8FAFC;
    border-radius: 10px;
    border: 1px solid #E2E8F0;

    top: 8px;

  /* Footer */

    padding: 16px 20px 28px;
    font-size: 12px;

  /* Responsive */

    .dot-name { font-size: 9px; }
    .core-grid { grid-template-columns: 1fr; }
    .detail-card { max-width: 95vw; }
  }
</style>
</head>

const chartArea = document.getElementById('chartArea');

// Create dots
industries.forEach((ind, idx) => {
  const dot = document.createElement('div');
  dot.className = 'dot-group';
  dot.style.left = ind.x + '%';
  dot.style.bottom = ind.y + '%';
  dot.setAttribute('data-idx', idx);

  dot.innerHTML = `
    <div class="dot-outer" style="background:${ind.color}"></div>
    <div class="dot-inner" style="background:${ind.color}"></div>
    <div class="dot-name" style="color:${ind.color};border-color:${ind.color}">${ind.short}</div>
  `;

  dot.addEventListener('click', () => openCard(idx));
  chartArea.appendChild(dot);
});

function openCard(idx) {
  const ind = industries[idx];

  // Mark active
  document.querySelectorAll('.dot-group').forEach(d => d.classList.remove('active'));
  document.querySelector(`.dot-group[data-idx="${idx}"]`).classList.add('active');

  const card = document.getElementById('detailCard');
  card.innerHTML = `
    <div class="card-header" style="border-top: 4px solid ${ind.color}">
      <span class="card-cat" style="background:${ind.color}">${ind.cat}</span>
      <h2>${ind.full}</h2>
      <button class="card-close" onclick="closeCard()">✕</button>
    </div>

    <div class="scores-row">
      <div class="score-badge">구조 <strong style="color:${ind.color}">${ind.s}</strong></div>
      <div class="score-badge">복리 <strong style="color:${ind.color}">${ind.c}</strong></div>
      <div class="score-badge">확장 <strong style="color:${ind.color}">${ind.sc}</strong></div>
    </div>

    <div class="position-tag">
      <span class="pos-icon">📍</span>
      <span><strong>데이터 특성:</strong> ${ind.dataChars}</span>
    </div>

    <div class="card-section">
      <div class="section-title" style="color:${ind.color}"><span class="sec-icon">🏗️</span> 핵심 경쟁력 분석</div>
      <div class="core-grid">
        ${ind.core.map(c => `
          <div class="core-mini" style="border-top-color:${ind.color}">
            <h4>${c.title}</h4>
            <p>${c.items}</p>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="card-section">
      <div class="section-title" style="color:#3B82F6"><span class="sec-icon">▶</span> 데이터 예시</div>
      <ul class="card-list data-list">
        ${ind.dataExamples.map(d => `<li>${d}</li>`).join('')}
      </ul>
    </div>

    <div class="card-section">
      <div class="section-title" style="color:#F59E0B"><span class="sec-icon">★</span> AI 사업 기회</div>
      <ul class="card-list biz-list">
        ${ind.bizOpps.map(b => `<li>${b}</li>`).join('')}
      </ul>
    </div>

    <div class="card-section">
      <div class="section-title" style="color:#10B981"><span class="sec-icon">🛡️</span> 카카오 해자 시나리오</div>
      <ul class="card-list kakao-list">
        ${ind.kakao.map(k => `<li>${k}</li>`).join('')}
      </ul>
    </div>
  `;

  document.getElementById('overlay').classList.add('show');
}

function closeCard() {
  document.getElementById('overlay').classList.remove('show');
  document.querySelectorAll('.dot-group').forEach(d => d.classList.remove('active'));
}

// Keyboard close
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCard(); });
</script>
