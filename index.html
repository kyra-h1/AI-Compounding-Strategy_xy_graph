<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데이터가 돈이 되게 하는(사업 가능한) 영역</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR',sans-serif; background:#F8FAFC; color:#1E293B; overflow-x:hidden; }

  .page-header { text-align:center; padding:32px 20px 8px; }
  .page-header h1 { font-size:28px; font-weight:900; color:#0F172A; letter-spacing:-0.5px; }
  .page-header .subtitle { font-size:14px; color:#94A3B8; margin-top:6px; font-style:italic; }

  .legend-bar { display:flex; justify-content:center; gap:20px; padding:12px 20px 16px; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:12.5px; color:#475569; font-weight:500; }
  .legend-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }

  .chart-wrapper { position:relative; width:100%; max-width:1200px; margin:0 auto; padding:0 20px 40px; }
  .chart-area {
    position:relative; width:100%; aspect-ratio:1.45/1;
    border-left:2px solid #CBD5E1; border-bottom:2px solid #CBD5E1;
    background:linear-gradient(135deg,#F8FAFC,#F1F5F9); border-radius:0 8px 0 0; overflow:visible;
  }

  .quadrant { position:absolute; display:flex; align-items:center; justify-content:center; }
  .q-tl { top:0; left:0; width:50%; height:50%; background:rgba(99,102,241,0.04); border-radius:0 8px 0 0; }
  .q-tr { top:0; left:50%; width:50%; height:50%; background:rgba(139,92,246,0.04); }
  .q-bl { top:50%; left:0; width:50%; height:50%; background:rgba(59,130,246,0.04); }
  .q-br { top:50%; left:50%; width:50%; height:50%; background:rgba(16,185,129,0.04); }
  .quadrant-label { font-size:15px; font-weight:700; opacity:0.18; pointer-events:none; user-select:none; }
  .q-tl .quadrant-label { color:#6366F1; } .q-tr .quadrant-label { color:#8B5CF6; }
  .q-bl .quadrant-label { color:#3B82F6; } .q-br .quadrant-label { color:#059669; }

  .center-h,.center-v { position:absolute; background:#94A3B8; opacity:0.25; }
  .center-h { top:50%; left:0; width:100%; height:1px; }
  .center-v { top:0; left:50%; width:1px; height:100%; }

  .axis-label { position:absolute; font-size:14px; font-weight:700; color:#64748B; pointer-events:none; }
  .axis-x-left { bottom:-32px; left:4%; } .axis-x-right { bottom:-32px; right:2%; }
  .axis-y-bottom { top:calc(100% - 30px); left:-40px; transform:rotate(-90deg); }
  .axis-y-top { top:10px; left:-48px; transform:rotate(-90deg); }

  .dot-group {
    position:absolute; transform:translate(-50%,-50%); z-index:10; cursor:pointer;
  }
  .dot-outer {
    width:38px; height:38px; border-radius:50%; opacity:0.18;
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    transition:all .3s ease;
  }
  .dot-inner {
    width:18px; height:18px; border-radius:50%; border:3px solid white;
    position:relative; box-shadow:0 2px 8px rgba(0,0,0,.15);
    transition:all .3s ease; z-index:2;
  }
  .dot-group:hover .dot-outer { width:50px; height:50px; opacity:0.28; }
  .dot-group:hover .dot-inner { width:22px; height:22px; box-shadow:0 4px 16px rgba(0,0,0,.25); }
  .dot-group.active .dot-outer { width:54px; height:54px; opacity:0.3; animation:pulse 1.5s infinite; }
  .dot-group.active .dot-inner { width:24px; height:24px; }
  @keyframes pulse {
    0%,100% { opacity:0.3; transform:translate(-50%,-50%) scale(1); }
    50% { opacity:0.15; transform:translate(-50%,-50%) scale(1.3); }
  }
  .dot-name {
    position:absolute; top:24px; left:50%; transform:translateX(-50%);
    white-space:nowrap; font-size:11px; font-weight:600;
    padding:2px 8px; border-radius:4px; background:white;
    border:1.5px solid; box-shadow:0 1px 4px rgba(0,0,0,.08);
    pointer-events:none; z-index:3; transition:all .2s ease;
  }
  .dot-group:hover .dot-name { transform:translateX(-50%) scale(1.05); box-shadow:0 2px 8px rgba(0,0,0,.15); }

  /* Overlay & Card */
  .overlay {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:rgba(15,23,42,0.35); backdrop-filter:blur(4px);
    z-index:100; justify-content:center; align-items:center; padding:20px;
  }
  .overlay.show { display:flex; }
  .detail-card {
    background:white; border-radius:16px; max-width:660px; width:100%;
    box-shadow:0 25px 60px rgba(0,0,0,.2); overflow:hidden;
    animation:cardIn .3s ease; max-height:90vh; overflow-y:auto;
  }
  @keyframes cardIn {
    from { opacity:0; transform:scale(0.92) translateY(20px); }
    to { opacity:1; transform:scale(1) translateY(0); }
  }
  .card-header { padding:24px 28px 18px; position:relative; }
  .card-header .card-cat {
    font-size:12px; font-weight:600; padding:3px 10px;
    border-radius:20px; color:white; display:inline-block; margin-bottom:8px;
  }
  .card-header h2 { font-size:22px; font-weight:800; color:#0F172A; letter-spacing:-0.3px; }
  .card-close {
    position:absolute; top:18px; right:20px; width:32px; height:32px;
    border-radius:50%; border:none; background:#F1F5F9; color:#64748B;
    font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all .2s;
  }
  .card-close:hover { background:#E2E8F0; color:#1E293B; }

  .scores-row { display:flex; gap:8px; padding:0 28px 16px; flex-wrap:wrap; }
  .score-badge {
    display:flex; align-items:center; gap:5px;
    background:#F8FAFC; border:1px solid #E2E8F0; border-radius:8px;
    padding:5px 12px; font-size:12.5px; color:#475569;
  }
  .score-badge strong { font-weight:700; font-size:14px; }
  .score-na { color:#CBD5E1; font-size:12px; }

  .position-tag {
    margin:0 28px 16px; padding:10px 16px;
    background:#F8FAFC; border-radius:10px; border:1px solid #E2E8F0;
    font-size:13px; color:#475569; display:flex; align-items:center; gap:8px;
  }

  .card-section { padding:14px 28px; border-top:1px solid #F1F5F9; }
  .card-section:last-child { padding-bottom:24px; }
  .section-title {
    font-size:13px; font-weight:700; text-transform:uppercase;
    letter-spacing:0.5px; margin-bottom:10px; display:flex; align-items:center; gap:6px;
  }
  .card-list { list-style:none; display:flex; flex-direction:column; gap:6px; }
  .card-list li {
    font-size:13.5px; line-height:1.6; color:#334155;
    padding-left:20px; position:relative;
  }
  .card-list li::before {
    content:''; position:absolute; left:2px; top:8px; width:8px; height:8px; border-radius:2px;
  }
  .card-list.data-list li::before { background:#3B82F6; border-radius:50%; }
  .card-list.biz-list li::before { background:#F59E0B; }
  .card-list.kakao-list li::before { background:#10B981; border-radius:50%; }

  .core-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:8px; }
  .core-mini {
    background:#F8FAFC; border:1px solid #E2E8F0; border-radius:10px;
    padding:12px 14px; border-top:3px solid;
  }
  .core-mini h4 { font-size:11.5px; font-weight:700; margin-bottom:6px; color:#1E293B; }
  .core-mini p { font-size:11px; color:#64748B; line-height:1.5; }

  /* Abbreviation tooltips */
  .abbr {
    border-bottom:1.5px dotted #94A3B8; cursor:help; position:relative;
    color:#475569; font-weight:500;
  }
  .abbr-tooltip {
    display:none; position:absolute; bottom:calc(100% + 8px); left:50%;
    transform:translateX(-50%); background:#1E293B; color:white;
    padding:8px 14px; border-radius:8px; font-size:12px; line-height:1.5;
    white-space:nowrap; max-width:360px; white-space:normal;
    z-index:200; box-shadow:0 4px 16px rgba(0,0,0,.25);
    pointer-events:none;
  }
  .abbr-tooltip::after {
    content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%);
    border:6px solid transparent; border-top-color:#1E293B;
  }
  .abbr:hover .abbr-tooltip { display:block; }

  .page-footer { text-align:center; padding:16px 20px 28px; font-size:12px; color:#94A3B8; }

  @media (max-width:768px) {
    .page-header h1 { font-size:20px; }
    .dot-name { font-size:9px; }
    .core-grid { grid-template-columns:1fr; }
    .detail-card { max-width:95vw; }
  }
</style>
</head>

l Social Governance, 환경·사회·지배구조", "QA": "Quality Assurance, 품질 보증", "LiDAR": "Light Detection And Ranging, 레이저 기반 거리 측정 센서", "PDK": "Process Design Kit, 공정 설계 키트", "FDA": "Food & Drug Administration, 미국 식품의약국", "EMA": "European Medicines Agency, 유럽 의약품청", "ASML": "네덜란드 반도체 장비 제조 기업 (EUV 노광장비 독점)", "GE": "General Electric, 미국 제너럴일렉트릭", "EASA": "European Union Aviation Safety Agency, 유럽항공안전청", "FAA": "Federal Aviation Administration, 미국연방항공청", "PET": "Positron Emission Tomography, 양전자 방출 단층촬영", "CT": "Computed Tomography, 컴퓨터 단층촬영", "MRI": "Magnetic Resonance Imaging, 자기공명영상", "ECG": "Electrocardiogram, 심전도", "EEG": "Electroencephalogram, 뇌파 검사", "RF": "Radio Frequency, 고주파", "EUV": "Extreme Ultraviolet, 극자외선 (반도체 공정)", "ALD": "Atomic Layer Deposition, 원자층 증착", "UNECE": "United Nations Economic Commission for Europe, 유엔유럽경제위원회 (차량안전규제)", "SaaS": "Software as a Service, 서비스형 소프트웨어 (구독형)", "FaaS": "Feature as a Service, 서비스형 피처 데이터"};

function addTooltips(text) {
  // Sort keys by length descending
  const keys = Object.keys(glossary).sort((a,b) => b.length - a.length);
  for (const abbr of keys) {
    // Only replace first occurrence, avoid replacing inside HTML tags
    const escaped = abbr.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp('(?<![<\\w/])(' + escaped + ')(?![>\\w])', '');
    if (regex.test(text)) {
      text = text.replace(regex, '<span class="abbr">' + abbr + '<span class="abbr-tooltip">' + glossary[abbr] + '</span></span>');
    }
  }
  return text;
}

const chartArea = document.getElementById('chartArea');
industries.forEach((ind, idx) => {

  dot.className = 'dot-group';
  dot.style.left = ind.x + '%';
  dot.style.bottom = ind.y + '%';
  dot.setAttribute('data-idx', idx);
  dot.innerHTML = `
    <div class="dot-outer" style="background:${ind.color}"></div>
    <div class="dot-inner" style="background:${ind.color}"></div>
    <div class="dot-name" style="color:${ind.color};border-color:${ind.color}">${ind.short}</div>
  `;
  dot.addEventListener('click', () => openCard(idx));
  chartArea.appendChild(dot);
});

function openCard(idx) {

  const card = document.getElementById('detailCard');
  card.innerHTML = `

      <div class="score-badge">확장(Sc) ${scoreDisplay(ind.sc)}</div>
    </div>
    <div class="position-tag">
      <span>📍</span><span><strong>데이터 특성:</strong> ${ind.dataChars}</span>
    </div>
    <div class="card-section">
      <div class="section-title" style="color:${ind.color}">🏗️ 핵심 경쟁력 분석</div>
      <div class="core-grid">
        ${ind.core.map(c => `

            <p>${c.items}</p>
          </div>

      </div>
    </div>
    <div class="card-section">
      <div class="section-title" style="color:#3B82F6">▶ 데이터 예시</div>
      <ul class="card-list data-list">
        ${ind.dataExamples.map(d => '<li>' + d + '</li>').join('')}
      </ul>
    </div>
    <div class="card-section">
      <div class="section-title" style="color:#F59E0B">★ AI 사업 기회</div>
      <ul class="card-list biz-list">
        ${ind.bizOpps.map(b => '<li>' + b + '</li>').join('')}

      <ul class="card-list kakao-list">
        ${ind.kakao.map(k => '<li>' + k + '</li>').join('')}
      </ul>
    </div>
  `;

  // Apply tooltips to all text in card
  const sections = card.querySelectorAll('.card-list li, .core-mini p, .position-tag span:last-child');
  sections.forEach(el => {
    el.innerHTML = addTooltips(el.innerHTML);
  });

  document.getElementById('overlay').classList.add('show');
}

function closeCard() {
  document.getElementById('overlay').classList.remove('show');
  document.querySelectorAll('.dot-group').forEach(d => d.classList.remove('active'));
}
